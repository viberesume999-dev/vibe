<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VibeResume</title>
  <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg-color: #FDF8F0;
      --border-radius: 16px;
      --shadow: 0 4px 12px rgba(0,0,0,0.08);
      --primary-color: #5B3A29;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
    body { background-color: var(--bg-color); padding: 16px; padding-bottom: 80px; }
    .tab-content { display: none; }
    .active { display: block; }
    .tabs {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: white; display: flex; border-top: 1px solid #eee;
      z-index: 100;
    }
    .tab-button {
      flex: 1; padding: 12px; text-align: center; cursor: pointer;
      border: none; background: none; font-size: 16px;
    }
    .tab-button.active { font-weight: bold; color: var(--primary-color); }
    .card {
      background: white; border-radius: var(--border-radius); padding: 16px;
      margin-bottom: 16px; box-shadow: var(--shadow);
    }
    input, textarea, select, button {
      width: 100%; padding: 12px; margin-top: 8px;
      border-radius: var(--border-radius); border: 1px solid #ddd;
    }
    button {
      background-color: var(--primary-color); color: white; border: none; cursor: pointer;
    }
    button:disabled { background-color: #ccc; cursor: not-allowed; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .frame {
      aspect-ratio: 1; background: #f0f0f0; border-radius: var(--border-radius);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; cursor: pointer;
    }
    .modal {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000;
    }
    .modal-content {
      background: white; padding: 20px; border-radius: var(--border-radius);
      max-width: 90%; max-height: 80%; overflow-y: auto;
    }
    .close { float: right; font-size: 24px; cursor: pointer; }
    .hidden { display: none; }
    .guardian {
      position: fixed; bottom: 80px; right: 16px;
      font-size: 40px; cursor: pointer; background: white;
      border-radius: 50%; width: 56px; height: 56px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow); z-index: 100;
    }
    .quote { font-style: italic; color: #555; margin: 8px 0; }
    pre { white-space: pre-wrap; font-family: inherit; margin: 12px 0; }
  </style>
</head>
<body>

<!-- Модальное окно первого запуска -->
<div id="onboarding-modal" class="modal" style="display: flex;">
  <div class="modal-content">
    <h2>Добро пожаловать в VibeResume</h2>
    <label>Регион:</label>
    <select id="region">
      <option>Москва</option><option>Санкт-Петербург</option>
      <option>Мой регион</option><option>Удалёнка</option>
    </select>
    <label>Сегмент:</label>
    <select id="segment">
      <option>Студент</option><option>Женщина</option><option>Обычный соискатель</option>
    </select>
    <label><input type="checkbox" id="consent1" required> Я согласен на обработку текста резюме для генерации</label>
    <label><input type="checkbox" id="consent2"> Я согласен на сохранение имени на моём устройстве для PDF</label>
    <button id="start-btn" disabled>Начать</button>
  </div>
</div>

<!-- Вкладки (меню) -->
<div class="tabs">
  <button class="tab-button active" data-tab="gallery">Галерея</button>
  <button class="tab-button" data-tab="create">Создать</button>
  <button class="tab-button" data-tab="profile">Профиль</button>
</div>
<!-- Галерея -->
<div id="gallery" class="tab-content active">
  <div class="card"><h3>Мои резюме</h3><div class="grid" id="gallery-grid"></div><button onclick="clearGallery()">Очистить галерею</button></div>
</div>

<!-- Создать -->
<div id="create" class="tab-content">
  <div class="card">
    <label><input type="radio" name="mode" value="simple" checked onchange="toggleMode()"> Просто вайб-резюме</label>
    <label><input type="radio" name="mode" value="vacancy" onchange="toggleMode()"> Под вакансию</label>
  </div>
  <div class="card" id="simple-mode">
    <textarea id="resume-text" placeholder="Вставьте текст резюме (имя, телефон, email можно не убирать — они автоматически удалятся)"></textarea>
    <input type="text" id="user-name" placeholder="Ваше имя (для PDF, опционально)">
    <select id="style-simple">
      <option>Дерзкий</option><option>Мягкий</option><option>Киберпанк</option>
      <option>Минимализм</option><option>Поэтичный</option>
    </select>
    <button onclick="generateSimple()">Сгенерировать</button>
  </div>
  <div class="card hidden" id="vacancy-mode">
    <textarea id="resume-text-vacancy" placeholder="Текст вашего резюме"></textarea>
    <textarea id="vacancy-text" placeholder="Текст вакансии"></textarea>
    <input type="text" id="user-name-vacancy" placeholder="Ваше имя (для PDF, опционально)">
    <select id="style-vacancy">
      <option>Дерзкий</option><option>Мягкий</option><option>Киберпанк</option>
      <option>Минимализм</option><option>Поэтичный</option>
    </select>
    <button onclick="generateVacancy()">Создать резюме + сопроводительное</button>
  </div>
</div>

<!-- Профиль -->
<div id="profile" class="tab-content">
  <div class="card">
    <h3>Профиль</h3>
    <p class="quote" id="daily-quote">Загрузка...</p>
    <p>До следующей рамки: <span id="progress-text">0/3</span></p>
    <div style="background:#eee;height:10px;border-radius:5px;margin:8px 0;"><div id="progress-bar" style="width:0;height:100%;background:#5B3A29;border-radius:5px;"></div></div>
    <button onclick="clearData()">Очистить мои данные</button>
    <p>Создано резюме: <span id="resume-count">0</span></p>
    <button onclick="openOnboarding()">Изменить регион/сегмент</button>
    <p><a href="#" target="_blank">Пользовательское соглашение</a> | <a href="#" target="_blank">Политика конфиденциальности</a></p>
    <p><a href="#" target="_blank">Поддержка</a></p>
  </div>
</div>

<!-- Персонаж-хранитель -->
<div class="guardian" onclick="showGuardianPhrase()">🦊</div>

<!-- Модальное окно резюме -->
<div id="resume-modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <h3>Ваше резюме</h3>
    <pre id="resume-content"></pre>
    <button onclick="downloadCurrentAsPDF()">Скачать PDF (бесплатно, тест)</button>
    <button id="download-cover-btn" class="hidden" onclick="downloadCoverLetter()">Скачать сопроводительное</button>
  </div>
</div>

<script>
  // === НАСТРОЙКИ ===
  const DEEPSEEK_PROXY_URL = 'ВАШ_CLOUDFLARE_WORKER_URL'; // ЗАМЕНИТЕ НА ВАШ URL
  let generationCountToday = parseInt(localStorage.getItem('generationCount') || '0');
  let currentResumeText = '';
  let currentCoverText = '';
  let currentUserName = '';

  // === Переключение вкладок ===
  document.querySelectorAll('.tab-button').forEach(btn => {
    btn.addEventListener('click', () => {
      const tabId = btn.getAttribute('data-tab');
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      btn.classList.add('active');
    });
  });

  // === Режимы создания ===
  window.toggleMode = function() {
    const mode = document.querySelector('input[name="mode"]:checked').value;
    document.getElementById('simple-mode').classList.toggle('hidden', mode !== 'simple');
    document.getElementById('vacancy-mode').classList.toggle('hidden', mode !== 'vacancy');
  };
// === VK Bridge (без ошибок вне VK) ===
  let vkBridge = { send: () => Promise.resolve() };
  if (window.vkBridge) {
    vkBridge = window.vkBridge;
    try { vkBridge.send('VKWebAppInit'); } catch(e) { console.log('VK Bridge не инициализирован'); }
  }

  // === Первый запуск ===
  if (!localStorage.getItem('onboarded')) {
    document.getElementById('onboarding-modal').style.display = 'flex';
  } else {
    document.getElementById('onboarding-modal').style.display = 'none';
    loadProfile();
    loadGallery();
  }

  document.getElementById('consent1').addEventListener('change', function() {
    document.getElementById('start-btn').disabled = !this.checked;
  });
  document.getElementById('start-btn').addEventListener('click', function() {
    if (!document.getElementById('consent1').checked) return;
    localStorage.setItem('region', document.getElementById('region').value);
    localStorage.setItem('segment', document.getElementById('segment').value);
    localStorage.setItem('consent1', 'true');
    localStorage.setItem('consent2', document.getElementById('consent2').checked);
    localStorage.setItem('onboarded', 'true');
    document.getElementById('onboarding-modal').style.display = 'none';
    loadProfile();
    loadGallery();
  });

  // === Санитизация ===
  function sanitizeText(text) {
    return text
      .replace(/\b[\w\.-]+@[\w\.-]+\.\w{2,}\b/g, '[EMAIL]')
      .replace(/\+?[78]\s?\(?\d{3}\)?[\s\-]?\d{3}[\s\-]?\d{2}[\s\-]?\d{2}/g, '[PHONE]');
  }

  // === Генерация через DeepSeek ===
  async function generateViaDeepSeek(prompt) {
    try {
      const res = await fetch(DEEPSEEK_PROXY_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt })
      });
      if (res.ok) {
        const data = await res.json();
        return data.result;
      }
    } catch(e) { console.error(e); }
    return null;
  }

  function fallbackTemplate(style, isCover = false) {
    const templates = {
      resume: [
        ✨ Ваше резюме в стиле "${style}" готово! Мы подчеркнули ваши сильные стороны.,
        🔥 Стиль "${style}" добавил харизмы вашему опыту. Такое резюме точно заметят.
      ],
      cover: [
        Здравствуйте! Меня заинтересовала ваша вакансия. Мой опыт и навыки отлично подходят. Буду рад обсудить детали.
      ]
    };
    const list = isCover ? templates.cover : templates.resume;
    return list[Math.floor(Math.random() * list.length)];
  }

  // === Генерация простого резюме ===
  window.generateSimple = async function() {
    let rawText = document.getElementById('resume-text').value;
    if (!rawText.trim()) { alert('Введите текст резюме'); return; }
    if (generationCountToday >= 5) { alert('Лимит 5 генераций в день'); return; }

    const userName = document.getElementById('user-name').value;
    const style = document.getElementById('style-simple').value;
    const cleanText = sanitizeText(rawText);
    const prompt = Перепиши резюме в стиле "${style}". Сохрани все ключевые факты, сделай текст живым, но профессиональным. Не добавляй имя, телефон, email. Вот текст: ${cleanText};

    let result = await generateViaDeepSeek(prompt);
    if (!result) result = fallbackTemplate(style, false);

    currentResumeText = result;
    currentUserName = userName;
    currentCoverText = '';
    saveToGallery(style, result, '', userName);
    showResumeModal(result, '');
  };

  // === Генерация под вакансию ===
  window.generateVacancy = async function() {
    const resumeText = document.getElementById('resume-text-vacancy').value;
    const vacancyText = document.getElementById('vacancy-text').value;
    if (!resumeText.trim() || !vacancyText.trim()) { alert('Заполните оба поля'); return; }
    if (generationCountToday >= 5) { alert('Лимит 5 генераций в день'); return; }
const userName = document.getElementById('user-name-vacancy').value;
    const style = document.getElementById('style-vacancy').value;
    const cleanResume = sanitizeText(resumeText);
    const cleanVacancy = sanitizeText(vacancyText);
    const resumePrompt = Адаптируй резюме под эту вакансию. Стиль: "${style}". Резюме: ${cleanResume}. Вакансия: ${cleanVacancy}. Не добавляй имя, телефон, email.;
    const coverPrompt = Напиши короткое сопроводительное письмо в стиле "${style}" к резюме: ${cleanResume}. Вакансия: ${cleanVacancy}. Без имени, без контактов.;

    let resumeResult = await generateViaDeepSeek(resumePrompt);
    if (!resumeResult) resumeResult = fallbackTemplate(style, false);
    let coverResult = await generateViaDeepSeek(coverPrompt);
    if (!coverResult) coverResult = fallbackTemplate(style, true);

    currentResumeText = resumeResult;
    currentCoverText = coverResult;
    currentUserName = userName;
    saveToGallery(style, resumeResult, coverResult, userName);
    showResumeModal(resumeResult, coverResult);
  };

  // === Сохранение в галерею ===
  function saveToGallery(style, resume, cover, userName) {
    const gallery = JSON.parse(localStorage.getItem('gallery') || '[]');
    const emojiMap = { 'Дерзкий':'🔥', 'Мягкий':'🌸', 'Киберпанк':'🤖', 'Минимализм':'⬜', 'Поэтичный':'🖋️' };
    gallery.unshift({
      id: Date.now(), style, emoji: emojiMap[style] || '📄',
      resume, cover, userName, timestamp: new Date().toISOString()
    });
    localStorage.setItem('gallery', JSON.stringify(gallery));
    generationCountToday++;
    localStorage.setItem('generationCount', generationCountToday);
    loadGallery();
    loadProfile();
  }

  window.loadGallery = function() {
    const gallery = JSON.parse(localStorage.getItem('gallery') || '[]');
    const grid = document.getElementById('gallery-grid');
    grid.innerHTML = '';
    gallery.forEach(item => {
      const div = document.createElement('div');
      div.className = 'frame';
      div.textContent = item.emoji;
      div.onclick = () => showResumeModal(item.resume, item.cover);
      grid.appendChild(div);
    });
  };

  window.clearGallery = function() {
    if (confirm('Очистить галерею?')) { localStorage.removeItem('gallery'); loadGallery(); }
  };

  window.showResumeModal = function(resume, cover) {
    document.getElementById('resume-content').textContent = resume;
    const coverBtn = document.getElementById('download-cover-btn');
    if (cover && cover.trim()) {
      coverBtn.classList.remove('hidden');
      currentCoverText = cover;
    } else {
      coverBtn.classList.add('hidden');
      currentCoverText = '';
    }
    document.getElementById('resume-modal').style.display = 'flex';
  };
  window.closeModal = function() { document.getElementById('resume-modal').style.display = 'none'; };

  window.downloadCurrentAsPDF = function() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.text(currentResumeText, 10, 10);
    if (currentUserName) doc.text(Имя: ${currentUserName}, 10, 50);
    doc.save('resume.pdf');
  };
  window.downloadCoverLetter = function() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.text(currentCoverText, 10, 10);
    doc.save('cover_letter.pdf');
  };

  window.loadProfile = function() {
    const gallery = JSON.parse(localStorage.getItem('gallery') || '[]');
    document.getElementById('resume-count').textContent = gallery.length;
    const progress = generationCountToday % 3;
    document.getElementById('progress-text').textContent = ${progress}/3;
    document.getElementById('progress-bar').style.width = ${(progress / 3) * 100}%;
    const quotes = ["Сделай шаг — и дорога появится.", "Ты сильнее, чем думаешь.", "Каждый день — новая возможность."];
    document.getElementById('daily-quote').textContent = quotes[Math.floor(Math.random() * quotes.length)];
};
  window.clearData = function() {
    if (confirm('Удалить все данные?')) { localStorage.clear(); location.reload(); }
  };
  window.openOnboarding = function() { document.getElementById('onboarding-modal').style.display = 'flex'; };

  const phrases = ["Я тут, чтобы помочь!", "Ты справишься!", "Всё получится!"];
  window.showGuardianPhrase = function() { alert(phrases[Math.floor(Math.random() * phrases.length)]); };
</script>
</body>
</html>
